<!-- I pressed "!" and then "Tab" in my code editor to generate a basic HTML template.  -->

<!-- Let's explain the boilerplate code:

    1. DOCTYPE declares the document type and version of HTML being used, i.e. HTML5 in this case. 
    2. lang="en" shows that the language of the document is English.
    3. <head> contains meta info about the document.
        * Meta info means 'data about data'. 
        * It provides information about the webpage that is not displayed on the page itself.
        * This info is used by browsers and search engines.
        
    4. "UTF-8" means the character encoding for the document, e.g. we studed ASCII and Unicode in class. 
        * UTF-8 is a character encoding that can represent every character in the Unicode character set
        * This includes characters from almost all written languages in the world.   
        * It is widely used on the web and is the default encoding for HTML5 documents

    5. `<meta name="viewport" content="width=device-width, initial-scale=1. 0">`: 
        
    * "viewport" is a meta tag that helps with responsive web design. 
        * "Responsive web design" means designing websites that look good and work well on "all" devices.
        * This includes from desktop computers to mobile phones.
        * It tells the browser how to control the page's dimensions and scaling on different devices.

    * "width=device-width" sets the width of the page to follow the screen-width of device.
       
    * "initial-scale=1.0" sets the initial zoom level when the page is first loaded by the browser.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
</head>
<body>
    
    <h1>Student Details Form</h1>

    <form> 
<!--    User will enter their name here.   
-->

        Student Name:                
        <input type="text" name="student_name" ><br><br>  

<!-- 
        type ="text" means the input field is for text input.
        <br> is a line break, it moves the next element to a new line. 
-->

        Student ID:
        <input type="text" name="student_id"> <br><br>
<!--         
        Student ID is a unique identifier assigned to each student. 
        Input type="text" allows the user to enter their student ID as text. 
        The webpage will display a text box where the user can type in their student ID.
-->


        Date of Birth:<input type="date" name="date_of_birth"><br><br>

<!--    The type ="date" creates a date picker in the form. It allows users to select their dob birth from calendar.
        This calendar type entry has two benefits:
            * It is more user-friendly, as users can easily to avoid manual entry of date.
            * It ensures date is entered in a consistent format, i.e. avoiding data entry errors.
-->


        Gender:<br><br>
        Address:<br><br>
        Mobile Number:<br><br>
        Email ID: <br><br>
        Department:<br><br>

    </form>



</body>
</html>
