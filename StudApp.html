<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Application Form</title>
  
    <!-- I have linked the JavaScript file to this HTML document using the <script> tag. 
    This allows me to write JavaScript code in a separate file (StudApp.js). It interacts with the HTML elements on this page. 
    
    As required in the assignment question, JavaScript code is responsible for 
    * handling events
    * validating input
    * providing feedback to the user 
    -->
  
    <script src="StudApp.js"></script>
</head>
<body>
    
    <h1>Student Application Form</h1>
    
    <!--This is a placeholder for the student application form. 
        I will be adding input fields, labels, and buttons for the applicants to fill out their information.  -->
    
    <form>
        
        <label>Student Name:</label>

        <!-- 
            * Placeholder is beautiful thing that shows the user what to input in the field. It disappears when the user starts typing.
            * Onfocusout is an event that triggers when the user clicks outside the input field - which means they have finished entering their name. The checkName() function will be called when this event occurs.
            * It can be used to validate the input or provide feedback to the user. 
        -->

        <input type="text" id="name" placeholder="Saurabh Sharma" onfocusout="checkName()">

        <br><br>

        <label> Date of Birth: </label>
        <input type=""text" id="dob" placeholder="yyyy/mmm/dd"> 

        <!-- The <br> tag is used to create a line break in the HTML document. 
        This is just for making it easier to read and organize the form.
        Side Note: <br> is a self-closing tag, which means it does not require a closing tag. 
        -->
        
        <br><br>

        <!-- we make Age field readonly because it will be automatically calculated based on the Date of Birth input.
        We will use JavaScript to calculate the age and display it in this field when the user enters their date of birth. 
        -->

        <label> Age: </label>
        <input type="text" id="age" readonly>

        <label> Mobile Number: </label>
        <input type="text" id="mobile">

        <br><br>

        <label> Email: </label>
        <input type="text" id="email">

        <br><br>

        <label> City: </label>
        <input type="text" id="city">
        <br><br>


        <label> Country: </label>
        <input type="text" id="country">

        <br><br>


    </form>

</body>
</html>
